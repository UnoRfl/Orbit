<body>
<canvas id="waves" aria-hidden="true"></canvas>
<div id="glow" aria-hidden="true"></div>
<div id="app"><div class="solar-boot">
  <div class="solar-wrap">
    <svg class="solar-svg" viewBox="-160 -160 320 320" aria-hidden="true">
      <circle class="orbit-ring" cx="0" cy="0" r="26"/>
      <circle class="orbit-ring" cx="0" cy="0" r="42"/>
      <circle class="orbit-ring hi" cx="0" cy="0" r="60"/>
      <circle class="orbit-ring" cx="0" cy="0" r="80"/>
      <circle class="orbit-ring" cx="0" cy="0" r="106"/>
      <circle class="orbit-ring" cx="0" cy="0" r="128"/>
      <circle class="orbit-ring" cx="0" cy="0" r="146"/>
      <circle class="orbit-ring" cx="0" cy="0" r="156"/>
      <circle class="sun-glow" cx="0" cy="0" r="9"/>
      <circle class="sun-halo" cx="0" cy="0" r="12"/>
      <circle class="sun-body" cx="0" cy="0" r="4.5"/>
      <g class="solar-fallback-orbit" style="--dur:3s"><circle class="planet-body" cx="26" cy="0" r="1.3"/></g>
      <g class="solar-fallback-orbit" style="--dur:6s"><circle class="planet-body" cx="42" cy="0" r="2.1"/></g>
      <g class="solar-fallback-orbit" style="--dur:9s"><circle class="planet-body" cx="60" cy="0" r="2.3"/></g>
      <g class="solar-fallback-orbit" style="--dur:14s"><circle class="planet-body faint" cx="80" cy="0" r="1.8"/></g>
      <g class="solar-fallback-orbit" style="--dur:28s"><circle class="planet-body" cx="106" cy="0" r="5.4"/></g>
      <g class="solar-fallback-orbit" style="--dur:44s"><circle class="planet-body" cx="128" cy="0" r="4.6"/><circle class="planet-ring" cx="128" cy="0" r="7.5"/></g>
      <g class="solar-fallback-orbit" style="--dur:72s"><circle class="planet-body faint" cx="146" cy="0" r="3.3"/></g>
      <g class="solar-fallback-orbit" style="--dur:110s"><circle class="planet-body faint" cx="156" cy="0" r="3.1"/></g>
    </svg>
  </div>
  <div class="solar-brand">Orbit</div>
  <div class="solar-text">initializing</div>
  <div class="solar-meter"></div>
</div></div>

<script type="module" src="./main.js"></script>
