<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#17121f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit">

<meta name="description" content="A free co-study space for students — see who's free, who's in class, and plan study sessions without the group-chat chaos.">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Orbit">
<meta property="og:title" content="Orbit — See who's in your orbit.">
<meta property="og:description" content="See who's free, who's in class, and plan study sessions without the group-chat chaos.">
<meta property="og:url" content="https://unorfl.github.io/Orbit/">
<meta property="og:image" content="https://unorfl.github.io/Orbit/icon.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Orbit — See who's in your orbit.">
<meta name="twitter:description" content="See who's free, who's in class, and plan study sessions without the group-chat chaos.">
<meta name="twitter:image" content="https://unorfl.github.io/Orbit/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --canvas:#17121f; --panel:#1e1826; --panel2:#241d2e;
  --line:rgba(255,255,255,.075); --line-strong:rgba(255,255,255,.12);
  --ink:#f4eef7; --muted:#9a8fa8; --faint:#6f6480;
  --major:#b06bff; --ge:#2dd4bf; --pe:#34d399; --nstp:#f5b544; --now:#ff5d8f;
  --hour:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:
    radial-gradient(1000px 500px at 15% -10%, rgba(176,107,255,.10), transparent 60%),
    radial-gradient(800px 460px at 110% 8%, rgba(45,212,191,.06), transparent 55%),
    var(--canvas);
  color:var(--ink); min-height:100vh; line-height:1.45; overflow-x:hidden;
}
button{font-family:inherit;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
*{scrollbar-width:none}

#waves{position:fixed;inset:0;z-index:0;pointer-events:none}
#glow{position:fixed;left:0;top:0;width:560px;height:560px;z-index:0;pointer-events:none;opacity:0;
  background:radial-gradient(circle, rgba(176,107,255,.16), rgba(45,212,191,.05) 46%, transparent 70%);
  mix-blend-mode:screen;transition:opacity .5s ease;will-change:transform}

.appcol{position:relative;z-index:1;max-width:440px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.authcol{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.boot{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--faint);font-size:13px;letter-spacing:.1em}

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top)) 18px 10px}
.brand-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--major);font-weight:600}
.brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.02em;color:#fff;line-height:1;
  text-shadow:0 0 18px rgba(176,107,255,.4), 0 0 44px rgba(45,212,191,.2)}
.iconbtn{position:relative;width:42px;height:42px;border-radius:12px;background:var(--panel);border:1px solid var(--line);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s ease}
.iconbtn:hover{border-color:var(--line-strong)}
.iconbtn.orb{border-radius:999px;background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.07), transparent 55%), var(--panel)}
.iconbtn.orb.hot{border-color:var(--now);box-shadow:0 0 16px -6px var(--now)}
.iconbtn.orb .nbadge{top:2px;right:2px}

/* name flair — gradient names + star signatures */
.ngrad{background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-shadow:none}
.ngrad.shine{background-size:200% auto;animation:ngslide 3.2s linear infinite}
@keyframes ngslide{to{background-position:200% center}}
.namefx{display:inline-flex;align-items:center;gap:5px;min-width:0;max-width:100%}
.namefx>span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sig{flex:none;display:inline-flex;opacity:.95}
.cinput{width:46px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);padding:3px;cursor:pointer}
.nbadge{position:absolute;top:5px;right:5px;min-width:16px;height:16px;border-radius:999px;background:var(--now);color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

.content{flex:1;overflow-y:auto;padding:6px 18px calc(96px + env(safe-area-inset-bottom));animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--pc)}50%{box-shadow:0 0 0 5px transparent}}
@keyframes toastin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}

.eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--major);font-weight:600}
.hint{font-size:12.5px;color:var(--muted);margin-top:8px}
.small{font-size:11px;color:var(--faint)}

/* story bar */
.stories{display:flex;gap:14px;overflow-x:auto;padding:12px 2px 6px}
.story{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;width:62px;flex:none;padding:0}
.story-label{font-size:11px;color:var(--muted);max-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.ring{padding:2.5px;border-radius:50%}
.ring>div{padding:2px;border-radius:50%;background:var(--canvas)}
.ring.live{animation:spin 7s linear infinite}
.avwrap{position:relative;flex:none}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;
  font-weight:700;color:#0f0a16;letter-spacing:-.02em;flex:none;user-select:none}
.statusdot{position:absolute;right:-1px;bottom:-1px;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--canvas);animation:pulse 1.8s ease-in-out infinite}
.pinbadge{position:absolute;right:-2px;bottom:-2px;width:15px;height:15px;border-radius:50%;background:var(--panel2);
  border:2px solid var(--canvas);display:flex;align-items:center;justify-content:center;color:var(--ge)}
.addbubble{width:48px;height:48px;border-radius:50%;border:1.5px dashed var(--line-strong);display:flex;align-items:center;justify-content:center;color:var(--muted);background:rgba(255,255,255,.02)}

/* cards & rows */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.cardrow{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:11px;
  cursor:pointer;text-align:left;width:100%;transition:border-color .15s ease}
.cardrow:hover{border-color:var(--line-strong)}
.rowname{font-size:13px;font-weight:600;color:var(--ink)}
.rowsub{font-size:11px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.stack{display:flex;flex-direction:column;gap:8px}

/* buttons */
.btn{border-radius:11px;padding:11px 14px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:border-color .15s ease, background .15s ease}
.btn:hover{border-color:var(--line-strong)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-grad{background:linear-gradient(135deg,var(--major),var(--ge));border:none;color:#0f0a16;font-weight:700;font-family:'Space Grotesk',sans-serif}
.btn-soft-green{background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.4);color:var(--pe)}
.btn-soft-red{background:rgba(255,93,143,.1);border:1px solid rgba(255,93,143,.35);color:#ffb1c8}
.btn-block{width:100%}
.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:7px 12px;font-size:12px;cursor:pointer;flex:none;transition:border-color .15s ease}
.pill.on{background:rgba(176,107,255,.14);border-color:var(--major);color:var(--ink);font-weight:600}
.pill.on-teal{background:rgba(45,212,191,.13);border-color:var(--ge);color:var(--ink);font-weight:600}
.pillrow{display:flex;flex-wrap:wrap;gap:7px}
.pillrow.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}

/* forms */
.flabel{font-size:10.5px;color:var(--faint);font-family:'Space Grotesk',sans-serif;letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px;font-weight:600}
.input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--ink);
  font-size:13.5px;outline:none;transition:border-color .15s ease;appearance:none}
.input:focus{border-color:rgba(176,107,255,.55)}
select.input{background-image:linear-gradient(45deg,transparent 50%,var(--faint) 50%),linear-gradient(135deg,var(--faint) 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%, calc(100% - 13px) 50%;background-size:5px 5px;background-repeat:no-repeat}
.formrow{display:flex;gap:10px}
.formrow>*{flex:1;min-width:0}
.errbox{margin-top:12px;background:rgba(255,93,143,.09);border:1px solid rgba(255,93,143,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:#ffc6d8;line-height:1.5}
.okbox{margin-top:12px;background:rgba(52,211,153,.09);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:#b9f4dd;line-height:1.5}
.warnbox{background:rgba(255,93,143,.09);border:1px solid rgba(255,93,143,.3);border-radius:12px;padding:12px 13px}

/* password field with eye */
.pwwrap{position:relative}
.pwwrap .input{padding-right:44px}
.pweye{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:none;background:none;
  color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px}
.pweye:hover{color:var(--muted)}

/* responsive form grids */
.addgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 10px}
.addgrid .flabel{margin:0 0 8px}
.f-wide{grid-column:1/-1}
.classlist{display:grid;gap:8px}
.profgrid{display:grid;grid-template-columns:1fr;gap:12px}
.profgrid .flabel{margin:0 0 8px}

/* schedule grid */
.board{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:6px}
.gridscroll{overflow:auto;border-radius:12px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:62vh;max-height:62dvh}
.sgrid{display:grid;grid-template-columns:40px repeat(6,minmax(98px,1fr));min-width:620px}
.hcell{padding:10px 4px 9px;text-align:center;border-bottom:1px solid var(--line-strong);border-left:1px solid var(--line);
  position:sticky;top:0;z-index:10;background:var(--panel)}
.hcell.today{background:#291b2b}
.htime{border-bottom:1px solid var(--line-strong);position:sticky;top:0;left:0;z-index:12;background:var(--panel)}
.dow{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px}
.cnt{display:block;font-size:10px;color:var(--faint);margin-top:2px}
.taxis{position:sticky;left:0;z-index:9;background:var(--panel)}
.hr{position:absolute;right:6px;transform:translateY(-6px);font-size:9.5px;color:var(--faint);font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums}
.track{position:relative;border-left:1px solid var(--line);
  background-image:repeating-linear-gradient(to bottom,transparent 0,transparent calc(var(--hour) - 1px),var(--line) calc(var(--hour) - 1px),var(--line) var(--hour))}
.track.wknd{background-color:rgba(255,255,255,.015)}
.track.today{background-color:rgba(255,93,143,.028)}
.cls{position:absolute;left:4px;right:4px;border-radius:8px;padding:5px 6px 5px 8px;overflow:hidden;display:flex;flex-direction:column;gap:1px;cursor:pointer;
  background:color-mix(in srgb,var(--c) 13%,transparent);border:1px solid color-mix(in srgb,var(--c) 34%,transparent)}
.cls::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c);border-radius:8px 0 0 8px}
.cname{font-weight:600;font-size:10.5px;line-height:1.15;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:9px;color:var(--c);font-weight:600;margin-top:auto;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt{position:absolute;left:4px;right:4px;border-radius:8px;padding:5px 6px 5px 8px;overflow:hidden;display:flex;flex-direction:column;gap:1px;cursor:pointer;
  background:linear-gradient(135deg,rgba(176,107,255,.18),rgba(45,212,191,.14));border:1px dashed rgba(255,255,255,.4)}
.evt .ctime{color:#e7d9f5}
.nowline{position:absolute;left:0;right:0;height:2px;z-index:7;pointer-events:none;background:var(--now);box-shadow:0 0 8px rgba(255,93,143,.8)}
.nowline::before{content:"";position:absolute;left:-2px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 10px rgba(255,93,143,.9)}

/* map */
.maparea{position:relative;width:100%;aspect-ratio:1/1.05;border:1px solid var(--line);border-radius:18px;overflow:hidden;isolation:isolate;
  background:radial-gradient(700px 400px at 30% -10%, rgba(176,107,255,.10), transparent 60%), var(--panel)}
.mapgrid{position:absolute;inset:0;opacity:.6;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:40px 40px}
.zone{position:absolute;transform:translate(-50%,-50%);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;
  padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:76px;transition:border-color .15s ease,background .15s ease}
.zone.on{background:rgba(45,212,191,.14);border-color:var(--ge)}
.zname{font-size:10px;color:var(--ink);font-weight:600;font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.zav{display:flex;margin-top:2px;min-height:22px;align-items:center}
.zav .avatar{border:1.5px solid var(--panel)}
.quiet{font-size:9.5px;color:var(--faint)}

/* toggle */
.tgl{width:46px;height:26px;border-radius:999px;border:none;cursor:pointer;background:rgba(255,255,255,.12);position:relative;transition:background .18s ease;flex:none}
.tgl.on{background:var(--ge)}
.tgl span{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .18s ease}
.tgl.on span{left:23px}

/* bottom sheet (mobile) / centered dialog (desktop) */
.sheetback{position:fixed;inset:0;z-index:90;background:rgba(10,6,16,.72);display:flex;align-items:flex-end;justify-content:center;animation:rise .18s ease}
.sheet{width:100%;max-width:440px;max-height:86vh;max-height:86dvh;overflow-y:auto;overscroll-behavior:contain;background:var(--panel2);
  border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,.14);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -20px 60px rgba(0,0,0,.6);position:relative;animation:pop .22s ease}
.sheetbar{position:absolute;left:0;right:0;top:0;height:3px;border-radius:20px 20px 0 0}
.sheettitle{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff}
.xbtn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex:none}
.sheethead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;max-width:440px;margin:0 auto}
.navin{display:flex;background:rgba(24,18,32,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.navbtn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;position:relative;color:var(--faint)}
.navbtn.on{color:var(--major)}
.navbtn span{font-size:10.5px;color:var(--faint);font-weight:500}
.navbtn.on span{color:var(--ink);font-weight:600}
.navbadge{position:absolute;top:2px;right:50%;margin-right:-18px;min-width:15px;height:15px;border-radius:999px;background:var(--now);
  color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* toasts */
.toasts{position:fixed;top:calc(12px + env(safe-area-inset-top));left:0;right:0;z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:rgba(36,29,46,.97);border:1px solid rgba(176,107,255,.35);border-radius:999px;padding:10px 16px;color:var(--ink);
  font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:toastin .2s ease;display:flex;align-items:center;gap:8px;max-width:90vw}
.toast .em{font-size:15px}

/* auth */
.authwrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 22px calc(40px + env(safe-area-inset-bottom))}
.authcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-top:22px}
.authtabs{display:flex;gap:8px}
.authtab{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:9px;font-size:12.5px;font-weight:600;cursor:pointer}
.authtab.on{background:rgba(176,107,255,.14);border-color:var(--major);color:var(--ink)}

.detrow{display:flex;gap:12px;align-items:baseline;padding:8px 0}
.detrow+.detrow{border-top:1px solid rgba(255,255,255,.08)}
.detlab{color:var(--faint);min-width:58px;font-size:10.5px;font-family:'Space Grotesk',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-weight:600;flex:none}
.detval{color:var(--ink);font-size:13.5px;min-width:0;overflow-wrap:anywhere}

a{color:var(--ge)}
:focus-visible{outline:2px solid rgba(176,107,255,.7);outline-offset:2px}

/* ============ solar system boot loader ============ */
.solar-boot{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;
  gap:22px;padding:40px 20px;text-align:center;position:relative;z-index:2}
.solar-wrap{position:relative;width:280px;height:280px;max-width:80vmin;max-height:80vmin}
.solar-svg{width:100%;height:100%;display:block;overflow:visible}
.orbit-ring{fill:none;stroke:rgba(255,255,255,.05);stroke-width:.6}
.orbit-ring.hi{stroke:rgba(255,255,255,.11)}
.sun-body{fill:#fff}
.sun-halo{fill:none;stroke:rgba(255,255,255,.32);stroke-width:.5}
.sun-glow{fill:rgba(255,255,255,.12)}
.planet-body{fill:#fff}
.planet-body.faint{opacity:.72}
.planet-ring{fill:none;stroke:rgba(255,255,255,.55);stroke-width:.5}
.solar-brand{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;letter-spacing:.36em;text-transform:uppercase;color:#fff;opacity:.92}
.solar-text{font-family:'Space Grotesk',sans-serif;font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);min-height:14px;transition:opacity .35s ease}
.solar-meter{width:100px;height:1px;background:rgba(255,255,255,.12);position:relative;overflow:hidden}
.solar-meter::after{content:'';position:absolute;top:0;left:-45%;width:45%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.75),transparent);animation:solar-sweep 1.6s linear infinite}
@keyframes solar-sweep{to{left:100%}}
.solar-fallback-orbit{transform-origin:0 0;animation:solar-fallback-spin var(--dur,20s) linear infinite}
@keyframes solar-fallback-spin{to{transform:rotate(360deg)}}

/* ============ space-themed map ============ */
.maparea.space{background:
  radial-gradient(circle at 50% 50%, rgba(176,107,255,.10), transparent 55%),
  radial-gradient(600px 400px at 20% 10%, rgba(45,212,191,.06), transparent 60%),
  radial-gradient(500px 400px at 100% 100%, rgba(255,93,143,.04), transparent 60%),
  #0b0714}
.maparea.space{aspect-ratio:1/1}
.mapstars{position:absolute;inset:0;pointer-events:none;opacity:.9;
  background-image:
    radial-gradient(1.5px 1.5px at 12% 8%, rgba(255,255,255,.6), transparent 60%),
    radial-gradient(1px 1px at 27% 22%, rgba(255,255,255,.4), transparent 60%),
    radial-gradient(1.5px 1.5px at 43% 6%, rgba(255,255,255,.5), transparent 60%),
    radial-gradient(1px 1px at 66% 14%, rgba(255,255,255,.35), transparent 60%),
    radial-gradient(1.3px 1.3px at 84% 9%, rgba(255,255,255,.45), transparent 60%),
    radial-gradient(1px 1px at 8% 34%, rgba(255,255,255,.35), transparent 60%),
    radial-gradient(1.4px 1.4px at 92% 32%, rgba(255,255,255,.5), transparent 60%),
    radial-gradient(1px 1px at 54% 42%, rgba(255,255,255,.3), transparent 60%),
    radial-gradient(1.2px 1.2px at 19% 51%, rgba(255,255,255,.42), transparent 60%),
    radial-gradient(1px 1px at 74% 58%, rgba(255,255,255,.3), transparent 60%),
    radial-gradient(1.4px 1.4px at 36% 67%, rgba(255,255,255,.5), transparent 60%),
    radial-gradient(1px 1px at 88% 72%, rgba(255,255,255,.35), transparent 60%),
    radial-gradient(1px 1px at 6% 78%, rgba(255,255,255,.32), transparent 60%),
    radial-gradient(1.3px 1.3px at 48% 88%, rgba(255,255,255,.45), transparent 60%),
    radial-gradient(1px 1px at 22% 94%, rgba(255,255,255,.3), transparent 60%),
    radial-gradient(1.2px 1.2px at 72% 92%, rgba(255,255,255,.4), transparent 60%),
    radial-gradient(1px 1px at 60% 76%, rgba(255,255,255,.3), transparent 60%)}
.mapstars::after{content:'';position:absolute;inset:0;animation:twinkle 5s ease-in-out infinite alternate;
  background-image:
    radial-gradient(1px 1px at 33% 27%, rgba(255,255,255,.7), transparent 60%),
    radial-gradient(1px 1px at 82% 44%, rgba(255,255,255,.6), transparent 60%),
    radial-gradient(1px 1px at 15% 62%, rgba(255,255,255,.5), transparent 60%),
    radial-gradient(1px 1px at 65% 82%, rgba(255,255,255,.6), transparent 60%)}
@keyframes twinkle{to{opacity:.32}}

.map-orbit{position:absolute;border-radius:50%;border:1px dashed rgba(255,255,255,.045);pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%)}
.map-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:7px;z-index:2}
.map-center-star{width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 40% 40%, #fff8d6, #f5b544 45%, #b45309 100%);
  box-shadow:0 0 22px rgba(245,181,68,.55), 0 0 44px rgba(245,181,68,.25);position:relative}
.map-center-star::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(245,181,68,.25);animation:sun-pulse 3.6s ease-in-out infinite}
@keyframes sun-pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:0}}
.map-center-label{font-family:'Space Grotesk',sans-serif;font-size:8px;letter-spacing:.34em;color:rgba(255,255,255,.45);font-weight:600}

.planet-zone{position:absolute;transform:translate(-50%,-50%);background:none;border:none;cursor:pointer;padding:0;line-height:0;transition:transform .18s ease}
.planet-zone:hover{transform:translate(-50%,-50%) scale(1.08)}
.planet-zone.on{transform:translate(-50%,-50%) scale(1.1)}
.planet-body{width:50px;height:50px;border-radius:50%;position:relative;transition:box-shadow .2s ease}
.planet-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:19px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.planet-zone.on .planet-body{box-shadow:0 0 0 2px rgba(255,255,255,.4), 0 0 32px currentColor}

.planet-body.p-purple{background:radial-gradient(circle at 32% 28%, #e6c5ff, #b06bff 45%, #4b1976 100%);color:#b06bff;box-shadow:0 0 22px rgba(176,107,255,.35)}
.planet-body.p-red   {background:radial-gradient(circle at 32% 28%, #ffb2a3, #ff6b5d 45%, #7a1a1a 100%);color:#ff6b5d;box-shadow:0 0 22px rgba(255,107,93,.35)}
.planet-body.p-blue  {background:radial-gradient(circle at 32% 28%, #b3d4ff, #4dabf7 45%, #1a3a6f 100%);color:#4dabf7;box-shadow:0 0 22px rgba(77,171,247,.35)}
.planet-body.p-gold  {background:radial-gradient(circle at 32% 28%, #ffe6a3, #f5b544 45%, #7a4b0a 100%);color:#f5b544;box-shadow:0 0 22px rgba(245,181,68,.35)}
.planet-body.p-green {background:radial-gradient(circle at 32% 28%, #a3ffcf, #34d399 45%, #10583b 100%);color:#34d399;box-shadow:0 0 22px rgba(52,211,153,.35)}
.planet-body.p-olive {background:radial-gradient(circle at 32% 28%, #d9ffb2, #82c34a 45%, #2d4f18 100%);color:#82c34a;box-shadow:0 0 22px rgba(130,195,74,.35)}

.planet-body.ring::after{content:'';position:absolute;left:-14px;right:-14px;top:50%;height:65%;
  transform:translateY(-50%) rotate(-22deg);border-radius:50%;
  border:2px solid rgba(255,255,255,.35);border-left-color:transparent;border-right-color:transparent;pointer-events:none}
.planet-zone .zav{position:absolute;top:-6px;right:-8px;display:flex}
.planet-zone .zav .avatar{border:2px solid #0b0714}
.map-svg{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:visible}
.planet-label{position:absolute;transform:translate(-50%,-50%);z-index:6000;pointer-events:none;
  font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:600;color:#fff;letter-spacing:.03em;white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,.95), 0 0 7px rgba(0,0,0,.85), 0 0 2px rgba(0,0,0,.9)}
.planet-label .cnt{color:var(--ge);font-weight:700}
.planet-label.on{text-shadow:0 0 10px var(--major), 0 1px 3px rgba(0,0,0,.95), 0 0 2px rgba(0,0,0,.9)}
.planet-zone .zname{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;color:#fff;letter-spacing:.06em;
  text-shadow:0 0 8px rgba(0,0,0,.95), 0 0 3px rgba(0,0,0,.9);white-space:nowrap}
.planet-zone .quiet{display:none}

/* ============ settings ============ */
.set-section{margin-top:22px}
.set-section:first-of-type{margin-top:14px}
.set-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;color:var(--faint);margin-bottom:10px}
.set-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0}
.set-row+.set-row{border-top:1px solid rgba(255,255,255,.055)}
.set-row-l{min-width:0;flex:1}
.set-label{font-size:13px;font-weight:600;color:var(--ink)}
.set-hint{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:2px}
.theme-tile{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;text-align:left;
  transition:border-color .15s ease, background .15s ease;position:relative;overflow:hidden}
.theme-tile:hover{border-color:var(--line-strong)}
.theme-tile.on{border-color:var(--major);background:rgba(176,107,255,.08)}
.theme-tile .swatch{display:flex;gap:5px;height:14px;margin-bottom:8px;border-radius:3px;overflow:hidden}
.theme-tile .swatch span{flex:1}
.theme-tile .tname{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.theme-tile .tdesc{font-size:10.5px;color:var(--muted);margin-top:2px}
.theme-tile.auto .swatch span{animation:auto-swatch 8s linear infinite}
.theme-tile.auto .swatch span:nth-child(2){animation-delay:-2s}
.theme-tile.auto .swatch span:nth-child(3){animation-delay:-4s}
.theme-tile.auto .swatch span:nth-child(4){animation-delay:-6s}
.theme-tile.auto .swatch span:nth-child(5){animation-delay:-8s}
@keyframes auto-swatch{0%{background:#b06bff}25%{background:#2dd4bf}50%{background:#ff5d8f}75%{background:#f5b544}100%{background:#b06bff}}
.pw-mini{margin-top:6px}
.blocklist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.blockrow{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:10px}
.dangerzone{background:rgba(255,93,143,.06);border:1px solid rgba(255,93,143,.22);border-radius:12px;padding:12px;margin-top:8px}
.slider{width:100%;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.08);height:4px;border-radius:2px;outline:none;margin-top:8px}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--major);cursor:pointer;box-shadow:0 0 0 4px rgba(176,107,255,.2)}
.slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--major);cursor:pointer;border:none;box-shadow:0 0 0 4px rgba(176,107,255,.2)}
.section-collapsed .set-card-body{display:none}
.section-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:2px 0}
.section-chevron{color:var(--faint);transition:transform .18s ease}
.section-collapsed .section-chevron{transform:rotate(-90deg)}

/* ============ status bubble over a story avatar ============ */
.stories{padding-top:30px}
.story{position:relative}
.storybubble{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);margin-bottom:5px;z-index:6;pointer-events:none;
  max-width:112px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Space Grotesk',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.01em;color:var(--ink);
  background:linear-gradient(180deg,rgba(46,40,60,.98),rgba(30,24,42,.98));border:1px solid var(--line-strong);
  border-radius:999px;padding:3px 9px;box-shadow:0 5px 16px rgba(0,0,0,.5);animation:bubblein .3s ease}
.storybubble::after{content:'';position:absolute;left:50%;top:100%;transform:translateX(-50%);width:0;height:0;
  border:4px solid transparent;border-top-color:rgba(30,24,42,.98);margin-top:-1px}
.storybubble .bdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;box-shadow:0 0 6px currentColor}
@keyframes bubblein{from{opacity:0;transform:translateX(-50%) translateY(5px)}to{opacity:1;transform:translateX(-50%)}}

/* ============ systems grid (map landing) ============ */
.sysinvite{border-color:rgba(176,107,255,.45);background:rgba(176,107,255,.07);margin:12px 0 2px}
.sysgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.systile{position:relative;border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;text-align:left;overflow:hidden;
  background:radial-gradient(130% 120% at 50% -10%, color-mix(in srgb, var(--sh) 20%, transparent), transparent 62%), var(--panel);
  transition:border-color .15s ease, transform .12s ease}
.systile:hover{border-color:var(--line-strong)}
.systile:active{transform:scale(.985)}
.sysmini{position:relative;width:100%;height:80px;margin-bottom:11px;pointer-events:none}
.sysmini .sun{position:absolute;left:50%;top:50%;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle at 38% 34%, #fff, color-mix(in srgb, var(--sh) 65%, #fff) 45%, color-mix(in srgb, var(--sh) 82%, #000));
  box-shadow:0 0 18px color-mix(in srgb, var(--sh) 70%, transparent)}
.sysmini .ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px dashed color-mix(in srgb, var(--sh) 42%, transparent)}
.sysmini .orbiter{position:absolute;left:50%;top:50%;width:0;height:0;transform-origin:0 0;animation:sys-spin var(--d,20s) linear infinite}
.sysmini .pdot{position:absolute;font-size:12px;line-height:1;transform:translate(-50%,-50%);filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
@keyframes sys-spin{to{transform:rotate(360deg)}}
.systile .sname{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.systile .smeta{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.systile .slive{display:inline-flex;align-items:center;gap:4px;color:var(--pe);font-weight:600}
.systile .sfaces{position:absolute;top:13px;right:13px;display:flex}
.systile .sfaces .avatar{border:2px solid var(--panel)}
.systile.addsys{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-style:dashed;
  background:rgba(255,255,255,.02);min-height:158px;color:var(--muted);gap:8px}
.systile.addsys .plusdisc{width:44px;height:44px;border-radius:50%;border:1.5px dashed var(--line-strong);display:flex;align-items:center;justify-content:center}
.systile.addsys:hover{color:var(--major)}
.systile.addsys:hover .plusdisc{border-color:var(--major)}
.systile .del{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:9px;background:rgba(255,93,143,.16);border:1px solid rgba(255,93,143,.42);
  color:#ffb1c8;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4}

/* ============ system detail (orrery header) ============ */
.syshead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sysback{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);border-radius:10px;padding:8px 11px;font-size:12px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;flex:none;transition:border-color .15s ease}
.sysback:hover{border-color:var(--line-strong)}
.systitle{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:#fff;letter-spacing:-.01em;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sysedit{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);border-radius:10px;padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;flex:none;transition:border-color .15s ease}
.sysedit:hover{border-color:var(--line-strong)}
.sysedit.on{border-color:var(--major);color:var(--ink);background:rgba(176,107,255,.14)}

/* dashed "add a place" planet inside a system */
.planet-zone.add .planet-body{background:rgba(255,255,255,.03);border:1.5px dashed var(--line-strong);box-shadow:none;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.planet-zone.add:hover .planet-body{border-color:var(--major);color:var(--major)}
.planet-zone .pdel{position:absolute;top:-7px;left:-9px;width:20px;height:20px;border-radius:50%;background:#2a1620;border:1px solid rgba(255,93,143,.55);
  color:#ffb1c8;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7}

/* emoji picker */
.emojigrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:8px}
.emojibtn{aspect-ratio:1;border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:10px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:border-color .12s ease, background .12s ease}
.emojibtn:hover{border-color:var(--line-strong)}
.emojibtn.on{border-color:var(--major);background:rgba(176,107,255,.16)}
.huerow{display:flex;gap:8px;margin-top:8px}
.hueswatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s ease}
.hueswatch:hover{transform:scale(1.08)}
.hueswatch.on{border-color:#fff;box-shadow:0 0 0 2px rgba(0,0,0,.5)}
@media (max-width:400px){.emojigrid{grid-template-columns:repeat(7,1fr)}}

@media (min-width:900px){
  .theme-grid{grid-template-columns:repeat(3,1fr)}
  .maparea.space{aspect-ratio:1/1}
}

/* ============ profile (You / friend) — Discord × IG ============ */
.profcover{position:relative;width:100%;aspect-ratio:5/2;border-radius:16px;overflow:hidden;border:1px solid var(--line);isolation:isolate;
  background:
    radial-gradient(120% 170% at 18% -20%, color-mix(in srgb, var(--pa,#b06bff) 30%, transparent), transparent 62%),
    radial-gradient(120% 170% at 96% 125%, color-mix(in srgb, var(--pb,#2dd4bf) 24%, transparent), transparent 62%),
    #0b0714}
.profcover .cimg{position:absolute;left:50%;top:50%;width:100%;height:100%;object-fit:cover;
  transform:translate(-50%,-50%) translate(var(--cx,0%),var(--cy,0%)) scale(var(--cz,1))}
.profhead{display:flex;align-items:flex-end;gap:12px;margin-top:-34px;padding:0 12px;position:relative;z-index:2}
.profav{flex:none;border-radius:50%;padding:4px;background:var(--canvas)}
.profbody{padding:8px 6px 0}
.avatar{position:relative;overflow:hidden}
.avimg{position:absolute;left:50%;top:50%;width:100%;height:100%;object-fit:cover;
  transform:translate(-50%,-50%) translate(var(--cx,0%),var(--cy,0%)) scale(var(--cz,1))}
.badgechip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));color:#a7a2b3;
  font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;flex:none}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.idchip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.03);color:var(--muted);font-size:11.5px}
.idchip b{color:var(--ink);font-weight:600}
.biotext{font-size:13px;color:var(--ink);opacity:.92;line-height:1.55;margin-top:10px;white-space:pre-wrap;overflow-wrap:anywhere}
textarea.input{resize:vertical;min-height:72px;line-height:1.5}

/* image framing (pan + zoom stored as a transform — the image is never copied) */
.adjframe{position:relative;width:100%;overflow:hidden;border-radius:14px;border:1px solid var(--line-strong);
  background:#0b0714;touch-action:none;cursor:grab;user-select:none;-webkit-user-select:none}
.adjframe:active{cursor:grabbing}
.adjframe img{position:absolute;left:50%;top:50%;width:100%;height:100%;object-fit:cover;pointer-events:none;
  transform:translate(-50%,-50%) translate(var(--cx,0%),var(--cy,0%)) scale(var(--cz,1))}
.adjmask{position:absolute;inset:0;pointer-events:none}
.adjmask.round::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:100%;aspect-ratio:1;border-radius:50%;box-shadow:0 0 0 400px rgba(8,5,14,.6);border:1.5px dashed rgba(255,255,255,.45)}

/* mission log (Map landing) */
.logframe{margin-top:24px;border:1px solid var(--line);border-radius:18px;padding:14px;position:relative;overflow:hidden;
  background:linear-gradient(155deg, color-mix(in srgb, var(--major) 8%, transparent), transparent 46%), var(--panel)}
.logrow{display:flex;gap:10px;align-items:flex-start;padding:11px 2px;border-top:1px solid var(--line)}
button.logrow{background:none;border:none;border-top:1px solid var(--line);width:100%;text-align:left;cursor:pointer;font-size:inherit}
button.logrow:hover .rowname{color:#fff}
.logtag{flex:none;font-size:8.5px;font-weight:700;font-family:'Space Grotesk',sans-serif;letter-spacing:.12em;text-transform:uppercase;
  padding:2.5px 7px;border-radius:6px;border:1px solid}

/* "Coming up" — offset frame with an origin line */
.upframe{margin-top:20px;margin-left:22px;border:1px solid rgba(245,181,68,.35);border-radius:20px 8px 20px 20px;padding:13px 13px 7px;
  background:linear-gradient(150deg, rgba(245,181,68,.09), transparent 58%), var(--panel);position:relative}
.upframe::before{content:'';position:absolute;left:-15px;top:24px;width:15px;height:1px;background:linear-gradient(90deg,transparent,rgba(245,181,68,.5))}
.uprow{display:flex;gap:11px;align-items:flex-start;padding:9px 2px;border-top:1px solid var(--line)}
.uprow:first-of-type{border-top:none}
.uporigin{font-size:10.5px;color:var(--faint);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
@media (min-width:900px){
  .upframe{margin-left:0;justify-self:end;width:92%}
  .profcover{aspect-ratio:3/1}
}

/* ============ desktop layout (≥900px) ============ */
@media (min-width:900px){
  .appcol{max-width:1180px;display:grid;grid-template-columns:232px minmax(0,1fr);grid-template-rows:auto 1fr;
    column-gap:40px;padding:0 32px;align-items:start}
  .topbar{grid-column:1/-1;padding:28px 4px 20px}
  .brand{font-size:30px}
  .content{grid-row:2;grid-column:2;overflow:visible;padding:0 2px 80px}
  .nav{position:sticky;top:28px;bottom:auto;left:auto;right:auto;grid-row:2;grid-column:1;margin:0;max-width:none;align-self:start;z-index:5}
  .navin{flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px;gap:2px;

    ${badge}</div>`;
  return html`<div class="avwrap">${core}${badge}</div>`;

// deterministic mini-constellation drawn from a user id — same five stars forever
function StarSig({ id, size=15 }) {
  const pts = useMemo(()=>{
    let h = hashStr(String(id||'orbit')) || 7;
    const rnd = () => ((h = (h*1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
    return Array.from({ length:5 }, ()=>[3+rnd()*18, 3+rnd()*12]);
  }, [id]);
  const path = pts.map(p=>p.join(',')).join(' ');
  return html`<svg width=${Math.round(size*24/18)} height=${size} viewBox="0 0 24 18" fill="none" aria-hidden="true">
    <polyline points=${path} stroke="currentColor" stroke-width=".8" opacity=".45"/>
    ${pts.map((p,i)=>html`<circle key=${i} cx=${p[0]} cy=${p[1]} r=${i===4?1.8:1.1} fill="currentColor" opacity=${i===4?1:.8}/>`)}
  </svg>`;
}

/* ============================================================
   SOLAR SYSTEM BOOT LOADER
   Top-view orrery on <canvas>. Planets orbit at speeds relative
   to the real solar system (Mercury fast → Neptune slow), scaled
   way down. On mount it spools up — the whole system eases from a
   standstill to full speed, so every load feels like it's igniting.
   Plain white, as asked.
   ============================================================ */
const LOAD_LINES = [
  'aligning the planets','charging thrusters','plotting your orbit','syncing schedules',
  'waking the satellites','calibrating gravity','finding your friends','warming the reactor',
  'checking the star charts','spinning up',
];
// [orbit radius, planet radius, relative angular speed, has ring, faint]
const PLANETS = [
  [26, 1.4, 4.15, false, false],
  [42, 2.2, 1.62, false, false],
  [60, 2.4, 1.00, false, false],
  [80, 1.9, 0.53, false, true ],
  [106,5.6, 0.084,false, false],
  [128,4.8, 0.034,true,  false],
  [146,3.4, 0.012,false, true ],
  [156,3.2, 0.006,false, true ],
];
function SolarLoader({ note }) {
  const cvRef = useRef(null);
  const [line, setLine] = useState(0);
  const [fade, setFade] = useState(true);
  useEffect(()=>{
    let i = 0;
    const iv = setInterval(()=>{
      setFade(false);
      setTimeout(()=>{ i=(i+1)%LOAD_LINES.length; setLine(i); setFade(true); }, 320);
    }, 2000);
    return ()=>clearInterval(iv);
  },[]);
  useEffect(()=>{
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext('2d');
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    let raf=0, W=0, H=0, cx=0, cy=0, t0=performance.now(), last=t0, angle=0;
    function size(){
      const dpr=Math.min(window.devicePixelRatio||1,2);
      const r=cv.getBoundingClientRect(); W=r.width; H=r.height;
      cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0); cx=W/2; cy=H/2;
    }
    size();
    const scale = () => Math.min(W,H)/2/170;   // fit the 156-radius system
    function frame(now){
      const dt=Math.min(50,now-last); last=now;
      const el=(now-t0)/1000;
      // ease from a standstill up to full speed, with a touch of overshoot
      const spin = reduced ? 0.25 : (1.6*(1-Math.exp(-el/0.85)) - 0.6*Math.exp(-el/0.4));
      angle += dt*0.001*spin;
      const s=scale();
      ctx.clearRect(0,0,W,H);
      ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
      // orbit rings
      for(const p of PLANETS){
        ctx.beginPath(); ctx.arc(0,0,p[0],0,Math.PI*2);
        ctx.strokeStyle = p[0]===60 ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.05)';
        ctx.lineWidth=0.6/s; ctx.stroke();
      }
      // sun
      const glow=ctx.createRadialGradient(0,0,0,0,0,12);
      glow.addColorStop(0,'rgba(255,255,255,.9)'); glow.addColorStop(.4,'rgba(255,255,255,.22)'); glow.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,4.4,0,Math.PI*2); ctx.fill();
      // planets
      PLANETS.forEach((p,i)=>{
        const a = angle*p[2] + i*1.7;
        const x=Math.cos(a)*p[0], y=Math.sin(a)*p[0];
        ctx.globalAlpha = p[4] ? 0.7 : 1;
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,p[1],0,Math.PI*2); ctx.fill();
        if(p[3]){ // ring
          ctx.globalAlpha=0.6; ctx.strokeStyle='#fff'; ctx.lineWidth=0.6/s;
          ctx.save(); ctx.translate(x,y); ctx.rotate(-0.4); ctx.scale(1,0.42);
          ctx.beginPath(); ctx.arc(0,0,p[1]+2.6,0,Math.PI*2); ctx.stroke(); ctx.restore();
        }
        ctx.globalAlpha=1;
      });
      ctx.restore();
      raf=requestAnimationFrame(frame);
    }
    raf=requestAnimationFrame(frame);
    const onR=()=>size(); addEventListener('resize',onR,{passive:true});
    return ()=>{ cancelAnimationFrame(raf); removeEventListener('resize',onR); };
  },[]);
  return html`<div class="solar-boot">
    <div class="solar-wrap"><canvas ref=${cvRef} class="solar-svg" aria-hidden="true"></canvas></div>
    <div class="solar-brand">Orbit</div>
    <div class="solar-text" style=${`opacity:${fade?1:0}`}>${note || LOAD_LINES[line]}</div>
    <div class="solar-meter"></div>
  </div>`;
}

/* ============================================================
   schedule grid
   ============================================================ */
function Grid({ ownerId, classesByOwner, events, onPick, compact=false }) {
  const scRef = useRef(null);
  const nd = nowInfo();
  const rows = (END-START)/60;
  const myClasses = classesByOwner[ownerId] || [];
  const myEvents = events.filter(e => {
    const going = e.host===ownerId || (e.event_invitees||[]).some(i=>i.invitee===ownerId && i.status==='accepted');
    return going;
  });
  const counts = [0,0,0,0,0,0];
  myClasses.forEach(c=>counts[c.day]++);
  myEvents.forEach(e=>{ if(e.day>=0 && e.day<=5) counts[e.day]++; });

  // jump the viewport to "today, around now" on mount
  useEffect(() => {
    const el = scRef.current; if (!el) return;
    const t = nowInfo();
    el.scrollTop = Math.max(0, pxFor(t.min) - Math.min(el.clientHeight||420, 420)*0.35);
    const hd = el.querySelector('.hcell.today');
    if (hd) el.scrollLeft = Math.max(0, hd.getBoundingClientRect().left - el.getBoundingClientRect().left + el.scrollLeft - 48);
  }, [ownerId]);

  return html`<div class="board"><div class="gridscroll" ref=${scRef}><div class="sgrid">
    <div class="htime"></div>
    ${DAYS.map((d,i)=>html`<div key=${d} class=${'hcell'+(i===nd.day?' today':'')}>
      <div class="dow" style=${i===nd.day?'color:var(--now)':''}>${d}</div>
      <div class="cnt">${counts[i]||'—'}</div></div>`)}
    <div class="taxis" style=${`height:${rows*HOUR}px`}>
      ${Array.from({length:rows+1}).map((_,hh)=>html`<div key=${hh} class="hr" style=${`top:${hh*HOUR}px`}>${fmt((7+hh)*60)}</div>`)}
    </div>
    ${DAYS.map((_,di)=>html`<div key=${di} class=${'track'+(di===5?' wknd':'')+(di===nd.day?' today':'')} style=${`height:${rows*HOUR}px`}>
      ${myClasses.filter(c=>c.day===di).map(c=>html`<div key=${c.id} class="cls" style=${`--c:${CAT[c.cat]||CAT.major};top:${pxFor(c.start_min)}px;height:${pxFor(c.end_min)-pxFor(c.start_min)-3}px`}
          onClick=${()=>onPick && onPick({type:'class', row:c})}>
        <span class="cname">${c.name}</span>
        ${!compact && html`<span class="cmeta">${c.meta}</span>`}
        <span class="ctime">${fmt(c.start_min)}–${fmt(c.end_min)}</span>
      </div>`)}
      ${myEvents.filter(e=>e.day===di).map(e=>html`<div key=${e.id} class="evt" style=${`top:${pxFor(e.start_min)}px;height:${pxFor(e.end_min)-pxFor(e.start_min)-3}px`}
          onClick=${()=>onPick && onPick({type:'event', row:e})}>
        <span class="cname">${e.emoji||KINDS[e.kind]?.emoji||'✨'} ${e.title}</span>
        <span class="ctime">${fmt(e.start_min)}–${fmt(e.end_min)}</span>
      </div>`)}
      ${di===nd.day && nd.min>=START && nd.min<=END && html`<div class="nowline" style=${`top:${pxFor(nd.min)}px`}></div>`}
    </div>`)}
  </div></div></div>`;
}

/* ============================================================
   status + conflicts
   ============================================================ */
function statusOf(pid, classesByOwner, events) {
  const nd = nowInfo();
  const cls = classesByOwner[pid] || [];
  for (const c of cls) if (c.day===nd.day && c.start_min<=nd.min && c.end_min>nd.min)
    return { kind:'class', text:`In ${c.name} · until ${fmt(c.end_min)}`, color:CATHEX[c.cat]||CATHEX.major };
  for (const e of events) {
    const going = e.host===pid || (e.event_invitees||[]).some(i=>i.invitee===pid && i.status==='accepted');
    if (going && e.day===nd.day && e.start_min<=nd.min && e.end_min>nd.min)
      return { kind:'event', text:`${KINDS[e.kind]?.label||'Plan'} · until ${fmt(e.end_min)}`, color:KINDS[e.kind]?.accent||'#b06bff' };
  }
  const rest = cls.filter(c=>c.day===nd.day && c.start_min>nd.min).sort((a,b)=>a.start_min-b.start_min);
  if (rest.length) return { kind:'free', text:`Free · next class ${fmt(rest[0].start_min)}`, color:'#9a8fa8' };
  return { kind:'free', text:'Free · no more classes today', color:'#9a8fa8' };
}
function conflictsFor(pid, day, s, e, classesByOwner, events) {
  const out = [];
  for (const c of (classesByOwner[pid]||[]))
    if (c.day===day && c.start_min<e && c.end_min>s) out.push(`${c.name} (${fmt(c.start_min)}–${fmt(c.end_min)})`);
  for (const ev of events) {
    const going = ev.host===pid || (ev.event_invitees||[]).some(i=>i.invitee===pid && i.status==='accepted');
    if (going && ev.day===day && ev.start_min<e && ev.end_min>s) out.push(`${ev.title} (${fmt(ev.start_min)}–${fmt(ev.end_min)})`);
  }
  return out;
}
